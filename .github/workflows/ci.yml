name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Software composition analysis
        run: npm audit --audit-level=high

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Start Docker Compose Services
        run: docker compose up -d --build

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "docker_practice-node-app:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Wait & Health Check (Integration Test)
        run: |
          echo "Waiting for node-app to be healthy..."
          timeout 60s sh -c 'until curl -sf http://localhost:3000/api/posts; do echo "Waiting for app to start..."; sleep 2; done'
          echo "App is healthy and responded successfully!"

      - name: Stop Docker Compose Services
        if: always()
        run: docker compose down -v
